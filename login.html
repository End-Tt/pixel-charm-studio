<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login | Pixel Charm Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,700;9..144,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="inner-page">
    <header class="site-header is-scrolled" data-header>
      <a class="brand" href="index.html" aria-label="Pixel Charm Studio home"><span class="brand-mark" aria-hidden="true"></span><span>Pixel Charm Studio</span></a>
      <nav class="nav-links" aria-label="Main navigation"><a href="custom.html" data-i18n="nav.custom">Custom</a><a href="kits.html" data-i18n="nav.kits">Kits</a><a href="pricing.html" data-i18n="nav.pricing">Pricing</a><a href="order.html" data-i18n="nav.order">Order</a></nav>
      <div class="header-actions"><div class="language-switcher" aria-label="Language selector"><button type="button" data-lang-button="en" aria-pressed="true">EN</button><button type="button" data-lang-button="zh" aria-pressed="false">中文</button><button type="button" data-lang-button="de" aria-pressed="false">DE</button></div><a class="nav-cta" href="register.html" data-i18n="auth.createAccount">Create account</a></div>
    </header>

    <main>
      <section class="auth-shell">
        <div class="auth-copy">
          <p class="eyebrow" data-i18n="auth.demo">Demo account</p>
          <h1 data-i18n="auth.loginTitle">Log in to your studio account.</h1>
          <p data-i18n="auth.loginCopy">This static demo keeps account data in your browser only. It is for testing the customer flow before adding real authentication.</p>
        </div>
        <form class="auth-form" data-auth-form="login">
          <label><span data-i18n="auth.email">Email</span><input type="email" name="email" required autocomplete="email"></label>
          <label><span data-i18n="auth.password">Password</span><input type="password" name="password" required autocomplete="current-password"></label>
          <button class="button button-primary full-width" type="submit" data-i18n="nav.login">Login</button>
          <p class="form-message" data-auth-message></p>
          <p class="auth-link"><span data-i18n="auth.noAccount">No account yet?</span> <a href="register.html" data-i18n="auth.registerNow">Register now</a></p>
        </form>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
